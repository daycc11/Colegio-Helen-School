spring.application.name=colegio

# Railway asigna el puerto dinámicamente
server.port=${PORT:8080}

# PostgreSQL local (se usa cuando no existe DATABASE_URL de Railway)
spring.datasource.url=jdbc:postgresql://localhost:5432/helen_school
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

spring.security.user.name=mrodriguez
spring.security.user.password=123456
