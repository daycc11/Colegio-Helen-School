spring.application.name=colegio

# Puerto dinámico (Railway lo inyecta, local usa 8080)
server.port=${PORT:8080}

# ══════════════════════════════════════════════════
# CONEXIÓN A BASE DE DATOS
# Si DATABASE_URL existe (Railway), RailwayDatabaseConfig la procesa.
# Si no, usa la conexión directa de abajo (local).
# ══════════════════════════════════════════════════

# Conexión directa con variables de Railway (reemplaza con tus datos reales)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/helen_school}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# CORS permitido (local + producción)
spring.security.user.name=mrodriguez
spring.security.user.password=123456
