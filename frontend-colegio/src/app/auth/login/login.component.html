<div class="login-page">

  <!-- Fondo decorativo -->
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="login-center">

    <!-- Brand -->
    <div class="login-brand">
      <div class="brand-icon-lg">
        <span class="material-symbols-outlined"
          style="font-size:2rem;font-variation-settings:'FILL' 1;color:var(--primary)">school</span>
      </div>
      <div>
        <h1>HELEN SCHOOL</h1>
        <p>Sistema de Gestión Académica</p>
      </div>
    </div>

    <!-- Alertas -->
    <div class="neo-alert neo-alert-error" *ngIf="errorMsg" style="margin-bottom:1rem">
      <span class="material-symbols-outlined" style="font-size:1.1rem">error</span>
      {{ errorMsg }}
    </div>
    <div class="neo-alert neo-alert-success" *ngIf="successMsg" style="margin-bottom:1rem">
      <span class="material-symbols-outlined" style="font-size:1.1rem">check_circle</span>
      {{ successMsg }}
    </div>

    <!-- Card -->
    <div class="login-card">

      <div class="login-card-header">
        <h2>Ingreso al Sistema</h2>
        <p>Ingresa tus credenciales para continuar</p>
      </div>

      <form class="login-form" (ngSubmit)="onLogin()">

        <!-- Usuario -->
        <div class="neo-form-group">
          <label>Usuario</label>
          <div class="neo-input-group">
            <span class="material-symbols-outlined neo-input-icon">person</span>
            <input class="neo-input" id="username" type="text" [(ngModel)]="username" name="username"
              placeholder="Ingrese su usuario" autocomplete="username" />
          </div>
        </div>

        <!-- Clave -->
        <div class="neo-form-group">
          <label>Contraseña</label>
          <div class="neo-input-group">
            <span class="material-symbols-outlined neo-input-icon">lock</span>
            <input class="neo-input" id="password" [type]="mostrarClave ? 'text' : 'password'" [(ngModel)]="password"
              name="password" placeholder="Ingrese su contraseña" autocomplete="current-password"
              style="padding-right:3rem" />
            <button type="button" class="toggle-pass-btn" (click)="togglePassword()"
              [title]="mostrarClave ? 'Ocultar' : 'Mostrar'">
              <span class="material-symbols-outlined" style="font-size:1.1rem">{{ mostrarClave ? 'visibility_off' :
                'visibility' }}</span>
            </button>
          </div>
        </div>

        <!-- Botón ingresar -->
        <button type="submit" class="btn-login" [disabled]="cargando">
          <span *ngIf="!cargando" style="display:flex;align-items:center;gap:.5rem;justify-content:center">
            <span class="material-symbols-outlined"
              style="font-size:1.1rem;font-variation-settings:'FILL' 1">login</span>
            Ingresar
          </span>
          <span *ngIf="cargando" style="display:flex;align-items:center;gap:.5rem;justify-content:center">
            <span class="mini-spinner"></span>
            Verificando...
          </span>
        </button>
      </form>
    </div>

    <p class="copyright">© 2026 HELEN SCHOOL — Todos los derechos reservados</p>
  </div>

</div>
